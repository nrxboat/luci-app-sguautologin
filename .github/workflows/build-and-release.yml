name: Build IPK & APK and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_ipk:
        description: Build IPK package (ImmortalWrt 24.10)
        type: boolean
        default: true
      build_apk:
        description: Build APK package (ImmortalWrt 25.12)
        type: boolean
        default: true

permissions:
  contents: write

env:
  PKG_NAME: luci-app-sguautologin

jobs:
  # ──────────────────────────────────────────────
  # Build .ipk using ImmortalWrt 24.10 SDK (OPKG)
  # ──────────────────────────────────────────────
  build-ipk:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.build_ipk != 'false' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: ${{ env.PKG_NAME }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential zstd file python3

      - name: Download ImmortalWrt 24.10 SDK (IPK)
        run: |
          BASE="https://downloads.immortalwrt.org/releases/24.10.6/targets/x86/64"
          FILE=$(curl -sL "$BASE/sha256sums" | grep -oP 'immortalwrt-sdk-24\.10\.6-x86-64_gcc-[^ ]+\.Linux-x86_64\.tar\.zst' | head -1)
          [ -z "$FILE" ] && { echo "SDK file not found"; exit 1; }
          echo "Downloading $FILE"
          wget -q "$BASE/$FILE" -O sdk.tar.zst
          mkdir sdk
          tar -I zstd -xf sdk.tar.zst -C sdk --strip-components=1
          rm -f sdk.tar.zst
          echo "SDK=$(pwd)/sdk" >> $GITHUB_ENV

      - name: Feed package into SDK
        run: |
          cp -r "$GITHUB_WORKSPACE/$PKG_NAME" "$SDK/package/$PKG_NAME"

      - name: Install feeds
        run: |
          cd "$SDK"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build package
        run: |
          cd "$SDK"
          # Generate default config first to avoid menuconfig recursive dependency issues
          make defconfig V=s
          # Enable our package as a module
          echo 'CONFIG_PACKAGE_luci-app-sguautologin=m' >> .config
          make defconfig V=s
          # Now build (set TERM to avoid terminal detection errors in CI)
          TERM=linux make package/$PKG_NAME/compile V=s

      - name: Collect IPK artifacts
        run: |
          mkdir -p /tmp/artifacts-ipk
          find "$SDK/bin" -name "*.ipk" -path "*/$PKG_NAME/*" -exec cp {} /tmp/artifacts-ipk/ \;
          echo "Collected files:"
          ls -lh /tmp/artifacts-ipk/

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-packages
          path: /tmp/artifacts-ipk/
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Build .apk using ImmortalWrt 25.12 SDK (APK)
  # ──────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.build_apk != 'false' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: ${{ env.PKG_NAME }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential zstd file python3

      - name: Download ImmortalWrt 25.12 SDK (APK)
        run: |
          BASE="https://downloads.immortalwrt.org/releases/25.12.0/targets/x86/64"
          FILE=$(curl -sL "$BASE/sha256sums" | grep -oP 'immortalwrt-sdk-25\.12\.0-x86-64_gcc-[^ ]+\.Linux-x86_64\.tar\.zst' | head -1)
          [ -z "$FILE" ] && { echo "SDK file not found"; exit 1; }
          echo "Downloading $FILE"
          wget -q "$BASE/$FILE" -O sdk.tar.zst
          mkdir sdk
          tar -I zstd -xf sdk.tar.zst -C sdk --strip-components=1
          rm -f sdk.tar.zst
          echo "SDK=$(pwd)/sdk" >> $GITHUB_ENV

      - name: Feed package into SDK
        run: |
          cp -r "$GITHUB_WORKSPACE/$PKG_NAME" "$SDK/package/$PKG_NAME"

      - name: Install feeds
        run: |
          cd "$SDK"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build package
        run: |
          cd "$SDK"
          # Generate default config first to avoid menuconfig recursive dependency issues
          make defconfig V=s
          # Enable our package as a module
          echo 'CONFIG_PACKAGE_luci-app-sguautologin=m' >> .config
          make defconfig V=s
          # Now build (set TERM to avoid terminal detection errors in CI)
          TERM=linux make package/$PKG_NAME/compile V=s

      - name: Collect APK artifacts
        run: |
          mkdir -p /tmp/artifacts-apk
          find "$SDK/bin" -name "*.apk" -path "*/$PKG_NAME/*" -exec cp {} /tmp/artifacts-apk/ \;
          echo "Collected files:"
          ls -lh /tmp/artifacts-apk/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages
          path: /tmp/artifacts-apk/
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Create GitHub Release (only on tag push)
  # ──────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-ipk, build-apk]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: |
          find . -type f -name "*.ipk" -o -name "*.apk" | sort

      - name: Generate release notes
        run: |
          cat > /tmp/release-notes.md <<-EOF
          ## luci-app-sguautologin ${{ github.ref_name }}

          ### 📦 Packages

          | Format | SDK | Package Manager |
          |--------|-----|----------------|
          | \`.ipk\` | ImmortalWrt 24.10.6 | OPKG |
          | \`.apk\` | ImmortalWrt 25.12.0 | APK |

          ### 🚀 Usage

          \`\`\`bash
          opkg install luci-app-sguautologin_*.ipk
          # or
          apk add luci-app-sguautologin_*.apk
          \`\`\`

          After installation, go to **Network → 校园网自动登录** in LuCI to configure.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: luci-app-sguautologin ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: |
            ipk-packages/*.ipk
            apk-packages/*.apk
          fail_on_unmatched_files: false
